[pytest]
# Пакет `blogicum` и manage.py лежат в каталоге blogicum/ относительно этого файла.
# pytest>=7 добавляет пути до загрузки pytest-django (иначе ImportError: No module named 'blogicum').
minversion = 7.0
pythonpath = blogicum
django_find_project = false
DJANGO_SETTINGS_MODULE = blogicum.settings
norecursedirs = env venv .venv
addopts = -rE -vv --show-capture=no --disable-warnings -p no:cacheprovider
testpaths = tests/
python_files = test_*.py
django_debug_mode = true
